<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0f;
    color: #cdd6f4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    background: #181825;
    border-bottom: 1px solid #313244;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #topbar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red   { background: #f38ba8; }
  .dot.yellow{ background: #f9e2af; }
  .dot.green { background: #a6e3a1; }

  #app-title {
    flex: 1;
    text-align: center;
    color: #6c7086;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #os-badge {
    font-size: 11px;
    color: #45475a;
    background: #1e1e2e;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid #313244;
  }

  #setup-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 40px;
  }

  #setup-screen h2 { color: #89b4fa; font-size: 18px; }
  #setup-screen p  { color: #6c7086; font-size: 12px; text-align: center; }

  #api-key-input {
    width: 100%;
    max-width: 480px;
    background: #181825;
    border: 1px solid #313244;
    color: #cdd6f4;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
  }
  #api-key-input:focus { border-color: #89b4fa; }

  #save-key-btn {
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }
  #save-key-btn:hover { background: #b4befe; }

  #terminal-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }

  .entry { display: flex; flex-direction: column; gap: 6px; }
  .entry-input { display: flex; align-items: center; gap: 8px; }

  .prompt-cwd   { color: #89b4fa; }
  .prompt-arrow { color: #a6e3a1; }
  .prompt-text  { color: #cdd6f4; }

  .translated {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #181825;
    border-left: 2px solid #89b4fa;
    border-radius: 0 6px 6px 0;
    color: #89b4fa;
    font-size: 12px;
  }

  .translated .arrow { color: #45475a; }
  .translated .cmd   { color: #cdd6f4; font-weight: 500; }

  .output-text {
    white-space: pre-wrap;
    word-break: break-all;
    color: #a6adc8;
    padding-left: 4px;
    line-height: 1.6;
  }

  .output-error {
    white-space: pre-wrap;
    color: #f38ba8;
    padding: 6px 12px;
    background: #1e1e2e;
    border-left: 2px solid #f38ba8;
    border-radius: 0 6px 6px 0;
  }

  .output-blocked {
    color: #f38ba8;
    padding: 6px 12px;
    background: #1e1e2e;
    border-left: 2px solid #f38ba8;
    border-radius: 0 6px 6px 0;
  }

  .output-warn {
    color: #f9e2af;
    padding: 6px 12px;
    background: #1e1e2e;
    border-left: 2px solid #f9e2af;
    border-radius: 0 6px 6px 0;
    font-size: 12px;
  }

  .streaming-cmd {
    color: #89b4fa;
    font-style: italic;
    opacity: 0.8;
  }

  #input-bar {
    background: #181825;
    border-top: 1px solid #313244;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #cwd-display {
    color: #89b4fa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
    font-size: 12px;
  }

  #input-arrow { color: #a6e3a1; font-weight: 700; }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #cdd6f4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    caret-color: #a6e3a1;
  }

  #cmd-input::placeholder { color: #45475a; }

  #spinner {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid #313244;
    border-top-color: #89b4fa;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .welcome {
    color: #6c7086;
    font-size: 12px;
    line-height: 1.8;
    padding: 8px 0;
  }
  .welcome span { color: #89b4fa; }

  #loading-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #45475a;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="dot red"></div>
  <div class="dot yellow"></div>
  <div class="dot green"></div>
  <div id="app-title">AI Terminal</div>
  <div id="os-badge">loading...</div>
</div>

<div id="loading-screen">Initializing...</div>

<div id="setup-screen" style="display:none;">
  <h2>Welcome to AI Terminal</h2>
  <p>Enter your Google Gemini API key to get started.<br>It's stored only in memory for this session.</p>
  <input id="api-key-input" type="password" placeholder="AIzaSy..." />
  <button id="save-key-btn">Connect →</button>
</div>

<div id="terminal-screen">
  <div id="output">
    <div class="welcome">
      <span>AI Terminal</span> is ready. Type naturally or use shell commands.<br>
      Examples: <span>go to downloads</span> · <span>list all files</span> · <span>make a folder called test</span>
    </div>
  </div>
  <div id="input-bar">
    <div id="cwd-display">~</div>
    <div id="input-arrow">❯</div>
    <input id="cmd-input" type="text" placeholder="Type a command or describe what you want..." autofocus />
    <div id="spinner"></div>
  </div>
</div>

<script>
function init() {
  // Check if Tauri is available
  if (!window.__TAURI__) {
    document.getElementById('loading-screen').textContent = 'Error: Tauri not available. Make sure withGlobalTauri is true in tauri.conf.json';
    return;
  }

  const { invoke } = window.__TAURI__.tauri;
  const { listen }  = window.__TAURI__.event;

  const loadingScreen  = document.getElementById('loading-screen');
  const setupScreen    = document.getElementById('setup-screen');
  const terminalScreen = document.getElementById('terminal-screen');
  const apiKeyInput    = document.getElementById('api-key-input');
  const saveKeyBtn     = document.getElementById('save-key-btn');
  const output         = document.getElementById('output');
  const cmdInput       = document.getElementById('cmd-input');
  const cwdDisplay     = document.getElementById('cwd-display');
  const spinner        = document.getElementById('spinner');
  const osBadge        = document.getElementById('os-badge');

  // Hide loading, show setup
  loadingScreen.style.display = 'none';
  setupScreen.style.display = 'flex';

  let cmdHistory = [];
  let historyIndex = -1;

  const os = navigator.platform.toLowerCase().includes('win') ? 'windows' : 'macos';
  osBadge.textContent = os;

  saveKeyBtn.addEventListener('click', async () => {
    const key = apiKeyInput.value.trim();
    if (key.length < 10) {
      apiKeyInput.style.borderColor = '#f38ba8';
      return;
    }
    try {
      await invoke('set_api_key', { key });
      setupScreen.style.display = 'none';
      terminalScreen.style.display = 'flex';
      const cwd = await invoke('get_cwd');
      cwdDisplay.textContent = cwd;
      cmdInput.focus();
    } catch (e) {
      alert('Failed to set API key: ' + e);
    }
  });

  apiKeyInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKeyBtn.click();
  });

  let streamEl = null;

  listen('stream-token', ({ payload }) => {
    if (streamEl) streamEl.textContent += payload;
  });

  listen('stream-fix-token', ({ payload }) => {
    if (streamEl) streamEl.textContent += payload;
  });

  function addStreamingEntry(inputText) {
    const entry = document.createElement('div');
    entry.className = 'entry';

    const inputLine = document.createElement('div');
    inputLine.className = 'entry-input';
    inputLine.innerHTML = `
      <span class="prompt-cwd">${escapeHtml(cwdDisplay.textContent)}</span>
      <span class="prompt-arrow">❯</span>
      <span class="prompt-text">${escapeHtml(inputText)}</span>
    `;
    entry.appendChild(inputLine);

    const tl = document.createElement('div');
    tl.className = 'translated';
    const arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = '↳';
    const cmdSpan = document.createElement('span');
    cmdSpan.className = 'streaming-cmd';
    tl.appendChild(arrow);
    tl.appendChild(cmdSpan);
    entry.appendChild(tl);
    output.appendChild(entry);
    output.scrollTop = output.scrollHeight;

    streamEl = cmdSpan;
    return entry;
  }

  async function submitCommand(input) {
    if (!input.trim()) return;

    cmdHistory.unshift(input);
    historyIndex = -1;

    cmdInput.value = '';
    cmdInput.disabled = true;
    spinner.style.display = 'block';

    addStreamingEntry(input);

    try {
      const result = await invoke('run_input', { input });

      const lastEntry = output.lastElementChild;
      const streamingSpan = lastEntry?.querySelector('.streaming-cmd');
      if (streamingSpan) {
        streamingSpan.className = 'cmd';
        streamingSpan.style.fontStyle = 'normal';
        streamingSpan.style.opacity = '1';
      }

      cwdDisplay.textContent = result.cwd;

      if (result.blocked) {
        const bl = document.createElement('div');
        bl.className = 'output-blocked';
        bl.textContent = '🚫 ' + (result.warn || 'Blocked');
        lastEntry.appendChild(bl);
      } else {
        if (result.warn) {
          const wn = document.createElement('div');
          wn.className = 'output-warn';
          wn.textContent = '⚠ ' + result.warn;
          lastEntry.appendChild(wn);
        }
        if (result.stdout?.trim()) {
          const out = document.createElement('div');
          out.className = 'output-text';
          out.textContent = result.stdout.trim();
          lastEntry.appendChild(out);
        }
        if (result.stderr?.trim()) {
          const err = document.createElement('div');
          err.className = 'output-error';
          err.textContent = result.stderr.trim();
          lastEntry.appendChild(err);
        }
      }

      output.scrollTop = output.scrollHeight;

    } catch (e) {
      const lastEntry = output.lastElementChild;
      const err = document.createElement('div');
      err.className = 'output-error';
      err.textContent = 'Error: ' + e;
      lastEntry?.appendChild(err);
    } finally {
      streamEl = null;
      spinner.style.display = 'none';
      cmdInput.disabled = false;
      cmdInput.focus();
    }
  }

  cmdInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      submitCommand(cmdInput.value.trim());
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex < cmdHistory.length - 1) {
        historyIndex++;
        cmdInput.value = cmdHistory[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        cmdInput.value = cmdHistory[historyIndex];
      } else {
        historyIndex = -1;
        cmdInput.value = '';
      }
    }
  });

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
}

// Wait for Tauri to inject __TAURI__ before running
if (window.__TAURI__) {
  init();
} else {
  document.addEventListener('DOMContentLoaded', () => {
    // Give Tauri a moment to inject the global
    setTimeout(init, 100);
  });
}
</script>
</body>
</html>
